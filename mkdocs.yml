site_name: ITMC Knowledge Base
site_description: 'ITMC Cloud Development Company - Services, Guides & Code Snippets'
site_author: 'ITMC Cloud Team'
site_url: 'https://itmc-cloud.github.io/itmc-knowledge-base'

repo_name: 'itmc-cloud/itmc-knowledge-base'
repo_url: 'https://github.com/itmc-cloud/itmc-knowledge-base'
edit_uri: 'edit/dev/docs/'

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  language: en
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - tags

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.mark
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Home: index.md
  - About Us: about.md
  - Services:
      - Overview: services/index.md
      - Cloud Solutions: services/cloud-solutions.md
      - Development: services/development.md
  - Guides:
      - Getting Started: guides/getting-started.md
      - Deployment Guide: guides/deployment.md
      - Onboarding: guides/boarding.md
  - Code Snippets:
      - Overview: snippets/index.md
      - Python: snippets/python.md
      - JavaScript: snippets/javascript.md
      - DevOps: snippets/devops.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/itmc-cloud
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/itmc-cloud
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback!

copyright: Copyright &copy; 2025 ITMC Cloud
